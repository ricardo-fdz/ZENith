<div class="min-h-screen flex items-center bg-dry-sage-100" id="login-container">

  <div class="bg-white min-h-screen content-center justify-center rounded-lg shadow-lg min-w-120 max-w-250 p-15">
    <h1 class="text-4xl text-center font-bold text-dark-teal-700 text center_focus_strong mb-10">
      ZEN<span class="text-dry-sage-500">i</span>th
    </h1>
    <h2 class="text-2xl font-bold mb-6 text-center text-dark-teal-700">Iniciar Sesión</h2>

    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" placeholder="example@email.com"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-dark-teal-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" placeholder="••••••••••••"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-dark-teal-500">
      </div>

      <button type="submit"
        class="w-full bg-dark-teal-700 text-white py-2 rounded-md hover:bg-dark-teal-600 transition cursor-pointer">
        Entrar
      </button>

      <div class="relative flex py-3 items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="flex-shrink mx-4 text-gray-400 text-sm">o</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <button
      (click)="onLoginWithGoogle()"
      [disabled]="loading()"
      type="button"
  class="w-full border border-gray-300 py-2 rounded-md flex items-center justify-center gap-2 hover:bg-gray-50 transition cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed ...">
        <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> {{ loading() ? 'Cargando...' : 'Iniciar con Google' }}
      </button>
      <small>No tienes cuenta <a href="">Regístrate</a></small>
    </form>
  </div>
  <div class="flex ms-20 w-100  flex flex-col max-h-screen">
    <h2 class="w-full text-5xl font-bold text-dark-teal-700 bg-gray-200 p-10" >Organiza tus ideas</h2>
    <div class="p-10  content-center justify-center  rounded-full ">
      <img src="../../../assets/login-ilustration.svg" alt="" class=" p-20 rounded-  w-full min-w-150 max-w-250">
    </div>
  </div>
</div>
